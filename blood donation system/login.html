<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | RaktSetu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="particles"></div>
  <header class="header">
    <a class="brand" href="index.html"><span class="brand-mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 7.1 5 10.7 5 15a7 7 0 0 0 14 0c0-4.3-3-7.9-7-13Z"/></svg></span>RaktSetu</a>
    <nav class="nav"><a href="index.html">Home</a><a href="find-blood.html">Find Blood</a><a href="hospitals.html">Hospitals</a><a href="register.html">Donate</a><a class="active" href="login.html">Login</a></nav>
    <a class="bell" href="notifications.html"><i data-lucide="bell"></i></a>
    <button class="mobile-toggle"><i data-lucide="menu"></i></button>
  </header>

  <main class="auth-wrap">
    <section class="glass-card auth-card">
      <div class="eyebrow">Secure access</div>
      <h2>Welcome back.</h2>
      <p>Demo authentication validates inputs and opens the donor dashboard. Real JWT, reCAPTCHA, OTP, and SMS delivery require a backend API.</p>
      <form class="form-grid" data-login-form>
        <div class="field full"><label>Email</label><input name="email" type="email" placeholder="you@example.com" required></div>
        <div class="field full"><label>Password</label><input name="password" type="password" minlength="6" placeholder="Minimum 6 characters" required></div>
        <label class="toggle field full"><input name="remember" type="checkbox"> Remember this device</label>
        <button class="btn primary field full" type="submit"><i data-lucide="log-in"></i>Login</button>
      </form>

      <div class="form-grid" style="margin-top:14px">
        <div class="field full"><label>Mobile OTP login</label><input data-login-mobile type="tel" placeholder="+91 98765 43210"></div>
        <button class="btn field full" data-login-otp><i data-lucide="smartphone"></i>Send OTP to mobile</button>
        <button class="btn field full" data-forgot-password>Forgot password</button>
        <button class="btn field full" disabled><i data-lucide="fingerprint"></i>Biometric login coming soon</button>
      </div>
      <p class="chip" data-login-status style="margin-top:14px">No active session</p>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="app.js"></script>
</body>
</html>
